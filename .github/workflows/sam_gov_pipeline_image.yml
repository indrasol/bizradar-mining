name: "[Infra] SAM.gov Pipeline Image"

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths:
      - 'sam_gov/services/acj_cron/**'
      - 'sam_gov/config/**'
      - 'sam_gov/utils/**'
      - 'sam_gov/__init__.py'
      - 'sam_gov_requirements.txt'
      - 'docker/sam-gov-cron.Dockerfile'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Build and Push SAM.gov Pipeline Image
        shell: bash
        run: |
          ACR_NAME="${{ secrets.AZ_ACR_NAME }}"
          az acr login --name "$ACR_NAME"

          IMAGE_NAME="sam-gov-pipeline"

          # Purge existing images to save space/cost
          echo "Fetching tags for repository $IMAGE_NAME in ACR $ACR_NAME..."
          TAGS=$(az acr repository show-tags --name "$ACR_NAME" --repository "$IMAGE_NAME" --output tsv || true)
          if [ -n "$TAGS" ]; then
            echo "Deleting existing tags..."
            for TAG in $TAGS; do
              echo "  - $IMAGE_NAME:$TAG"
              az acr repository delete --yes --name "$ACR_NAME" --image "$IMAGE_NAME:$TAG" || true
            done
          else
            echo "No existing tags found."
          fi

          # Dynamically get the login server
          ACR_LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer --output tsv)
          IMAGE_URI="$ACR_LOGIN_SERVER/$IMAGE_NAME:latest"
          IMAGE_TAG_URI="$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}"

          echo "Building image: $IMAGE_URI"
          docker build -t "$IMAGE_URI" -t "$IMAGE_TAG_URI" -f docker/sam-gov-cron.Dockerfile .

          echo "Pushing images..."
          docker push "$IMAGE_URI"
          docker push "$IMAGE_TAG_URI"