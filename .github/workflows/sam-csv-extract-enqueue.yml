name: SAM CSV Extract and Enqueue

on:
  workflow_dispatch:
    inputs:
      csv_limit:
        description: "Optional row limit (e.g. 100 for a test run)"
        required: false
        default: ""
      chunk_size:
        description: "Rows per chunk message (default: 500)"
        required: false
        default: "500"
      run_id:
        description: "Optional custom run ID for tracing"
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  trigger-enqueue-job:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Trigger CSV Enqueue Job
        run: |
          # Build env var overrides for this specific execution.
          # Any value set here overrides the defaults baked into the job's Bicep definition.
          ENV_VARS="CSV_CHUNK_SIZE_BIZ=${{ github.event.inputs.chunk_size || '500' }}"

          if [ -n "${{ github.event.inputs.csv_limit }}" ]; then
            ENV_VARS="$ENV_VARS CSV_LIMIT_BIZ=${{ github.event.inputs.csv_limit }}"
          fi

          if [ -n "${{ github.event.inputs.run_id }}" ]; then
            ENV_VARS="$ENV_VARS PIPELINE_RUN_ID_BIZ=${{ github.event.inputs.run_id }}"
          fi

          az containerapp job start \
            --name caj-csv-enqueue \
            --resource-group ${{ secrets.AZ_RESOURCE_GROUP_BIZ }} \
            --env-vars $ENV_VARS

          echo "CSV enqueue job triggered. The pipeline runs independently on Azure."
          echo "Monitor progress at: https://portal.azure.com/#resource/subscriptions/${{ secrets.AZ_SUBSCRIPTION_ID_BIZ }}/resourceGroups/${{ secrets.AZ_RESOURCE_GROUP_BIZ }}/providers/Microsoft.App/jobs/caj-csv-enqueue/executions"
