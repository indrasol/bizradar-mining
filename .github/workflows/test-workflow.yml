name: Queue Pipeline CI

on:
  pull_request:
    paths:
      - "sam_gov/workers/queue_pipeline/**"
      - "sam_gov/csv_enqueue_servicebus.py"
      - "tests/queue_pipeline/**"
      - ".github/workflows/test-workflow.yml"
  push:
    branches:
      - main
    paths:
      - "sam_gov/workers/queue_pipeline/**"
      - "sam_gov/csv_enqueue_servicebus.py"
      - "tests/queue_pipeline/**"
      - ".github/workflows/test-workflow.yml"
  workflow_dispatch:
    inputs:
      run_sql_integrity:
        description: "Run SQL integrity checks (requires Supabase secrets)"
        required: false
        default: "false"

jobs:
  queue-pipeline-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run queue pipeline tests
        run: pytest tests/queue_pipeline -q

  queue-sql-integrity:
    runs-on: ubuntu-latest
    needs: queue-pipeline-tests
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_sql_integrity == 'true' }}
    env:
      SUPABASE_URL_BIZ: ${{ secrets.SUPABASE_URL_BIZ }}
      SUPABASE_SERVICE_KEY_BIZ: ${{ secrets.SUPABASE_SERVICE_KEY_BIZ }}
      SUPABASE_ANON_KEY_BIZ: ${{ secrets.SUPABASE_ANON_KEY_BIZ }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SQL integrity checks
        run: python -m sam_gov.workers.queue_pipeline.sql_integrity_check
